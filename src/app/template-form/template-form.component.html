<form #f="ngForm" (ngSubmit)="onSubmit(f)">
    <div class="form-group">
      <label for="nome">Nome:</label>
      <input type="text" class="form-control" id="nome" placeholder="Nome Sobrenome" name="nome" ngModel>
    </div>
    <div class="form-group">
      <label for="email">E-mail:</label>
      <input type="email" class="form-control" id="email" placeholder="nome@example.com" name="email" ngModel>
    </div>
    <button type="submit" class="btn btn-primary">Enviar</button>
</form>
